<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Agentics Livestream</title>
<!-- Marketing: move the brand files to the main site and Access-Control-Allow-Origin: https://livestream.agentics.org -->

<link rel="stylesheet" href="https://agentics.org/brand/agentics-brand.css">
<link rel="icon" href="https://agentics.org/favicon.ico">

<script>
/* =====================================================
   DEFAULT CHANNEL / FALLBACK VIDEO
   Set CHANNEL_ID_DEFAULT to the real YouTube channel ID
   Example channel IDs look like: UCxxxxxxxxxxxxxxxxxxxxxx
   ===================================================== */

const CHANNEL_ID_DEFAULT = "UCq_8ihSPx2E2elW6Vyx2cdg";
const VIDEO_ID_DEFAULT = "WL25Gorjyos";

function getChannelId() {
  const url = new URL(window.location.href);
  return (
    url.searchParams.get("channel") ||
    url.searchParams.get("c") ||
    window.location.hash.startsWith("#UC") ? window.location.hash.substring(1) : "" ||
    CHANNEL_ID_DEFAULT
  );
}

function getVideoId() {
  const url = new URL(window.location.href);
  return (
    url.searchParams.get("v") ||
    url.searchParams.get("video") ||
    (!window.location.hash.startsWith("#UC") ? window.location.hash.substring(1) : "") ||
    VIDEO_ID_DEFAULT
  );
}
</script>

<style>
body{
margin:0;
background:var(--agentics-bg);
color:var(--agentics-text);
font-family:var(--agentics-font-main);
}

.container{
max-width:1400px;
margin:auto;
padding:24px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:16px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand img{
height:42px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.video{
aspect-ratio:16/9;
background:black;
}

.video iframe,
.chat iframe{
width:100%;
height:100%;
border:0;
}

.chat{
height:700px;
background:white;
}

.footer{
margin-top:20px;
color:var(--agentics-muted);
font-size:14px;
}

.home-button{
position:fixed;
top:16px;
left:16px;
z-index:1000;
padding:8px 14px;
border-radius:999px;
text-decoration:none;
font-weight:600;
background:var(--agentics-accent);
color:#111827;
box-shadow:var(--agentics-shadow);
}

.status{
margin-top:8px;
font-size:13px;
color:var(--agentics-muted);
}

@media(max-width:1000px){
.grid{
grid-template-columns:1fr;
}
.chat{
height:500px;
}
}
</style>

</head>
<body>

<a class="home-button" href="https://agentics.org">
← Agentics
</a>

<div class="container">

<header class="header agentics-card">

<div class="brand">
<img id="logo" src="https://agentics.org/favicon.ico" alt="Agentics">
<div>
<div id="brandName">Agentics Foundation</div>
<div id="brandTagline" style="font-size:13px;color:var(--agentics-muted)">
Livestream
</div>
</div>
</div>

<a id="ytlink" class="agentics-pill agentics-pill-accent" target="_blank" rel="noopener noreferrer">
Watch on YouTube
</a>

</header>

<div class="grid">

<div class="video agentics-card">
<iframe id="ytplayer"
allow="autoplay; encrypted-media; picture-in-picture"
allowfullscreen></iframe>
</div>

<div class="chat agentics-card">
<iframe id="ytchat"></iframe>
</div>

</div>

<div class="footer">
<div id="modeLabel"></div>
<div id="idLabel" class="status"></div>
</div>

</div>

<script>
const CHANNEL_ID = getChannelId();
const VIDEO_ID = getVideoId();
const HAS_CHANNEL = CHANNEL_ID && CHANNEL_ID !== "REPLACE_WITH_CHANNEL_ID";

const player = document.getElementById("ytplayer");
const chat = document.getElementById("ytchat");
const ytlink = document.getElementById("ytlink");
const modeLabel = document.getElementById("modeLabel");
const idLabel = document.getElementById("idLabel");

if (HAS_CHANNEL) {
  player.src =
    `https://www.youtube.com/embed/live_stream?channel=${encodeURIComponent(CHANNEL_ID)}&autoplay=1&mute=1`;

  chat.src =
    `https://www.youtube.com/live_chat?channel=${encodeURIComponent(CHANNEL_ID)}&embed_domain=${location.hostname}`;

  ytlink.href =
    `https://www.youtube.com/channel/${encodeURIComponent(CHANNEL_ID)}/live`;

  modeLabel.textContent = "Mode: channel live embed";
  idLabel.textContent = `Channel ID: ${CHANNEL_ID}`;
} else {
  player.src =
    `https://www.youtube.com/embed/${encodeURIComponent(VIDEO_ID)}?autoplay=1&mute=1`;

  chat.src =
    `https://www.youtube.com/live_chat?v=${encodeURIComponent(VIDEO_ID)}&embed_domain=${location.hostname}`;

  ytlink.href =
    `https://youtube.com/watch?v=${encodeURIComponent(VIDEO_ID)}`;

  modeLabel.textContent = "Mode: fallback fixed video";
  idLabel.textContent = `Video ID: ${VIDEO_ID}`;
}
</script>

</body>
</html>
