<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Agentics Livestream</title>

<link id="brandStylesheet" rel="stylesheet">
<link id="brandFavicon" rel="icon">

<!-- Load editable configuration -->
<script src="/config.js"></script>

<script>
/* =====================================================
   Video selection
   ===================================================== */

function getVideoId() {
  const url = new URL(window.location.href);

  return (
    url.searchParams.get("v") ||
    url.searchParams.get("video") ||
    window.location.hash.substring(1) ||
    VIDEO_ID_DEFAULT
  );
}
</script>

<style>
body{
margin:0;
background:var(--agentics-bg);
color:var(--agentics-text);
font-family:var(--agentics-font-main);
}

.container{
max-width:1400px;
margin:auto;
padding:24px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:16px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand img{
height:42px;
}

.actions{
display:flex;
gap:12px;
align-items:center;
flex-wrap:wrap;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.video{
aspect-ratio:16/9;
background:black;
}

.video iframe,
.chat iframe{
width:100%;
height:100%;
border:0;
}

.chat{
height:700px;
background:white;
}

.footer{
margin-top:20px;
color:var(--agentics-muted);
font-size:14px;
}

.home-button{
position:fixed;
top:16px;
left:16px;
z-index:1000;
padding:8px 14px;
border-radius:999px;
text-decoration:none;
font-weight:600;
background:var(--agentics-accent);
color:#111827;
box-shadow:var(--agentics-shadow);
}

@media(max-width:1000px){
.grid{
grid-template-columns:1fr;
}

.chat{
height:500px;
}
}
</style>

</head>
<body>

<a class="home-button" href="https://agentics.org">
← Agentics
</a>

<div class="container">

<header class="header agentics-card">

<div class="brand">
<img id="logo" alt="Agentics logo">
<div>
<div id="brandName">Agentics Foundation</div>
<div id="brandTagline" style="font-size:13px;color:var(--agentics-muted)">
Livestream
</div>
</div>
</div>

<div class="actions">

<a id="ytlink"
class="agentics-pill agentics-pill-accent"
target="_blank"
rel="noopener noreferrer">
Watch on YouTube
</a>

<a id="meetingButton"
class="agentics-pill"
target="_blank"
rel="noopener noreferrer"
style="display:none">
Join Meeting
</a>

<a href="/admin" class="agentics-pill">
Admin
</a>

</div>

</header>

<div class="grid">

<div class="video agentics-card">
<iframe id="ytplayer"
allow="autoplay; encrypted-media"
allowfullscreen></iframe>
</div>

<div class="chat agentics-card">
<iframe id="ytchat"></iframe>
</div>

</div>

<div class="footer">
Video ID: <span id="videoid"></span>
</div>

</div>

<script>
/* =====================================================
   Load brand assets from configured base
   ===================================================== */

document.getElementById("brandStylesheet").href =
  `${BRAND_BASE_URL}/agentics-brand.css`;

document.getElementById("brandFavicon").href =
  `${BRAND_BASE_URL}/favicon.ico`;

document.getElementById("logo").src =
  `${BRAND_BASE_URL}/favicon.ico`;

/* =====================================================
   Video setup
   ===================================================== */

const VIDEO_ID = getVideoId();

document.getElementById("videoid").textContent = VIDEO_ID;

document.getElementById("ytplayer").src =
  `https://www.youtube.com/embed/${VIDEO_ID}?autoplay=1&mute=1`;

document.getElementById("ytchat").src =
  `https://www.youtube.com/live_chat?v=${VIDEO_ID}&embed_domain=${location.hostname}`;

document.getElementById("ytlink").href =
  `https://youtube.com/watch?v=${VIDEO_ID}`;

/* =====================================================
   Meeting button logic
   ===================================================== */

const btn = document.getElementById("meetingButton");

if (MEETING_URL) {
  btn.href = MEETING_URL;
  btn.textContent = "Join Meeting";
  btn.style.display = "inline-flex";
} else {
  btn.href = "https://agentics.org/community/calendar";
  btn.textContent = "View Calendar";
  btn.style.display = "inline-flex";
}
</script>

</body>
</html>
